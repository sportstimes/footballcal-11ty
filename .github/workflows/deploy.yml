name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  URL: 'https://footballcal.com'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install and Build
        env:
          GOOGLE_ADSENSE_PUBLISHER_ID: ${{ secrets.GOOGLE_ADSENSE_PUBLISHER_ID }}
          GOOGLE_ADSENSE_SLOT_GAME: ${{ secrets.GOOGLE_ADSENSE_SLOT_GAME }}
          GOOGLE_ADSENSE_SLOT_COMPETITION: ${{ secrets.GOOGLE_ADSENSE_SLOT_COMPETITION }}
        run: |
          npm install
          npm test
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=footballcal
